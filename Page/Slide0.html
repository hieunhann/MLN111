<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <title>Slide 0</title>

</head>
<body>
    <div class="slide-container" style="background-image: url('../BackgroundPNG/Slide6.png');">
        
        <!-- Header Section -->
        <header class="header-top" style="display: flex; justify-content: space-between; align-items: flex-start; width: 100%; padding: 40px 100px; position: absolute; top: 0; left: 0;">

                <img src="../BackgroundPNG/FPTU.png" alt="FPT University Logo" style="height: 80px; width: auto; object-fit: contain;">
            </div>

            <div class="badge-info" style="display: flex; align-items: center; gap: 10px; padding: 12px 30px; background: rgba(10, 20, 50, 0.7); border: 2px solid #3a86ff; box-shadow: 0 0 25px rgba(58, 134, 255, 0.5); border-radius: 12px; backdrop-filter: blur(10px);">

            </div>
        </header>

        <!-- Signature -->
        <div style="text-align: center; z-index: 1; margin-top: 2vh; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 100vw; padding: 0 20px;">

            <div style="margin-top: 2rem; font-family: 'Montserrat', sans-serif; opacity: 0.9;">
                <p style="font-size: 1.1rem; margin-bottom: 5px;">Giảng viên: HieuNT328</p>
                <p style="font-size: 1.1rem;">Class: 3W_MLN111_09</p>
            </div>
        </div>

        <!-- Start Button -->
        <a href="Slide1.html" class="btn-primary" style="margin-top: 4rem; position: relative; bottom: auto; transform: none; left: auto; padding: 24px 60px; font-size: 1.6rem; border-radius: 50px;">Bắt đầu</a>

    </div>

    <!-- Navigation logic will be globally handled later, 
         for now adding local key listener for testing -->

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
