<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 19</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../../assets/sidebar.js" defer></script>
    <style>
        .conclusion-container {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 3vw;
            width: 95%;
            max-width: 1200px;
            margin: 12vh auto 0; /* Tăng khoảng cách với Title */
            padding-bottom: 5vh;
        }

        .conclusion-card {
            flex: 1;
            background: rgba(10, 20, 40, 0.75);
            backdrop-filter: blur(20px);
            border: 2px solid #3a86ff;
            border-radius: 35px;
            padding: 3rem 2rem 2rem;
            position: relative;
            box-shadow: 0 0 40px rgba(58, 134, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .conclusion-card.animate {
            opacity: 1;
            transform: translateY(0);
        }

        .card-icon-wrap {
            width: 100px;
            height: 100px;
            background: #1a2b5c !important; /* Xanh đậm chủ đạo */
            border: 3px solid #3a86ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: 0 0 30px rgba(58, 134, 255, 0.6);
            margin-top: -6rem; /* Đẩy icon lên trên */
            z-index: 10;
        }

        .card-icon-wrap img {
            width: 55%;
            height: 55%;
            object-fit: contain;
            filter: brightness(0) invert(1); /* Biến icon thành màu trắng */
        }

        .card-icon-wrap i {
            color: #ffffff !important;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 2rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .card-list {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .card-list li {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
            color: rgba(255,255,255,0.9);
            position: relative;
            padding-left: 25px;
        }

        .card-list li b {
            color: #3a86ff;
        }

        .card-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #3a86ff;
            font-size: 1.4rem;
        }

        .arrow-item::before {
            content: "→" !important;
            font-weight: bold;
        }

        .custom-icon-stack {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-bulb {
            font-size: 2.8rem !important;
            color: #ffffff !important; /* Đổi về trắng cho thống nhất hoặc giữ vàng nhẹ */
            z-index: 2;
        }

        .sub-brain {
            position: absolute;
            font-size: 1.3rem !important;
            bottom: -5px;
            right: -5px;
            color: #ffffff !important;
            z-index: 3;
            background: #1a2b5c;
            border-radius: 50%;
            padding: 3px;
            border: 1px solid #3a86ff;
        }
    </style>
</head>
<body style="background: url('../../BackgroundPNG/slide5.png') center/cover no-repeat;">
    <div class="slide-container" style="background: transparent; justify-content: flex-start; overflow: hidden;">
        
        <h1 class="title-huge" style="font-size: 4rem; margin-top: 5vh; text-align: center; width: 100%; letter-spacing: 5px;">KẾT LUẬN</h1>

        <div class="conclusion-container">
            <!-- Left Card -->
            <div class="conclusion-card">
                <div class="card-icon-wrap">
                    <img src="../../assets/image23.svg" alt="Ba quy luật">
                </div>
                <h3 class="card-title">Ba quy luật:</h3>
                <ul class="card-list">
                    <li><b>Lượng → Chất:</b> biến đổi về chất</li>
                    <li><b>Đấu tranh và mâu thuẫn:</b> sự xuất hiện của các mâu thuẫn mới</li>
                    <li><b>Phủ định của phủ định:</b> quá trình kế thừa và phát triển</li>
                </ul>
            </div>

            <!-- Right Card -->
            <div class="conclusion-card">
                <div class="card-icon-wrap">
                    <div class="custom-icon-stack">
                        <i class="fas fa-lightbulb main-bulb"></i>
                        <i class="fas fa-brain sub-brain"></i>
                    </div>
                </div>
                <h3 class="card-title">Khủng hoảng ≠ kết thúc</h3>
                <ul class="card-list">
                    <li class="arrow-item">Là giai đoạn chuyển mình</li>
                    <li class="arrow-item">Con người phải thích nghi để phát triển</li>
                </ul>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.conclusion-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('animate');
                }, index * 400);
            });
        });

        // Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.location.href = '../Content02/Content02_7.html';
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.location.href = 'Content04_1.html';
            }
        });
    </script>
</body>
</html>
