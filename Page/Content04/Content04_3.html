<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 22</title>
    <link rel="stylesheet" href="../../style.css">
    <script src="../../assets/sidebar.js" defer></script>
</head>
<body style="background: url('../../BackgroundPNG/Slide3.png') center/cover no-repeat;">
    <div class="slide-container" style="background: transparent; justify-content: flex-start; padding: 3vh 8%;">
        
        <!-- Main Title -->
        <h1 class="title-huge" style="font-size: 5rem; text-align: center; margin-bottom: 2vh; letter-spacing: 15px; opacity: 0.9;">
            Q&A
        </h1>

        <p style="font-size: 1.4rem; font-weight: 700; text-align: center; color: #fff; margin-bottom: 4vh; line-height: 1.4; max-width: 80%; margin-left: auto; margin-right: auto;">
            Câu hỏi: "Bạn cảm thấy thế nào về tương lai của một lập trình viên trong kỷ nguyên AI?"
        </p>

        <div style="display: grid; grid-template-columns: 0.8fr 1.2fr; gap: 50px; width: 100%; align-items: start; flex: 1;">
            
            <!-- Left: Image -->
            <div style="position: relative;">
                <div style="position: absolute; inset: -15px; background: rgba(0, 172, 193, 0.3); filter: blur(30px); border-radius: 50px; z-index: 1;"></div>
                <img src="../../assets/coding_future.png" alt="Coding Future" 
                     style="width: 100%; border-radius: 50px; position: relative; z-index: 2; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 0 50px rgba(0,0,0,0.5);">
            </div>

            <!-- Right: Content -->
            <div style="color: #fff; display: flex; flex-direction: column; gap: 15px;">

                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <!-- Option 1 -->
                    <div class="qa-card" style="display: flex; align-items: center; gap: 25px; padding: 1rem 2rem; border-radius: 20px; text-align: left; background: rgba(20, 30, 60, 0.6); border-color: rgba(0, 255, 100, 0.2);">
                        <span style="font-size: 3rem; font-weight: 900; color: rgba(255,255,255,0.8); font-family: 'Montserrat';">1</span>
                        <div style="font-size: 1.15rem;"><b>Lo lắng:</b> AI sẽ thay thế và cướp mất việc làm của mình.</div>
                    </div>

                    <!-- Option 2 -->
                    <div class="qa-card" style="display: flex; align-items: center; gap: 25px; padding: 1rem 2rem; border-radius: 20px; text-align: left; background: rgba(20, 30, 60, 0.6); border-color: rgba(0, 172, 193, 0.2);">
                        <span style="font-size: 3rem; font-weight: 900; color: rgba(255,255,255,0.8); font-family: 'Montserrat';">2</span>
                        <div style="font-size: 1.15rem;"><b>Hào hứng:</b> AI là trợ thủ đắc lực giúp mình code nhanh và nhàn hơn.</div>
                    </div>

                    <!-- Option 3 -->
                    <div class="qa-card" style="display: flex; align-items: center; gap: 25px; padding: 1rem 2rem; border-radius: 20px; text-align: left; background: rgba(20, 30, 60, 0.6); border-color: rgba(106, 90, 205, 0.2);">
                        <span style="font-size: 3rem; font-weight: 900; color: rgba(255,255,255,0.8); font-family: 'Montserrat';">3</span>
                        <div style="font-size: 1.15rem;"><b>Trung lập:</b> Cần phải học cách sống chung và điều khiển AI.</div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Navigation -->
    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.location.href = 'Content04_2.html';
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.location.href = 'Content04_4.html';
            }
        });
    </script>
</body>
</html>
