<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 23</title>
    <link rel="stylesheet" href="../../style.css">
    <script src="../../assets/sidebar.js" defer></script>
</head>
<body style="background: url('../../BackgroundPNG/Slide3.png') center/cover no-repeat;">
    <div class="slide-container" style="background: transparent; justify-content: flex-start; padding: 3vh 10%;">
        
        <!-- Main Title -->
        <h1 class="title-huge" style="font-size: 5rem; text-align: center; margin-bottom: 2vh; letter-spacing: 15px; opacity: 0.9;">
            Q&A
        </h1>

        <div style="flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 8vh;">
            
            <!-- Wide Question Bubble -->
            <div class="qa-card" style="width: 100%; max-width: 1200px; padding: 4rem 3rem; border-radius: 40px; background: rgba(20, 30, 60, 0.7); border-color: rgba(0, 172, 193, 0.3); box-shadow: 0 0 60px rgba(0, 172, 193, 0.2);">
                <p style="font-size: 2rem; line-height: 1.6; color: #fff; font-weight: 500;">
                    "Nếu được dùng <span class="highlight-blue" style="font-size: 2.2rem;">1 từ duy nhất</span> để nói về rủi ro lớn nhất của AI, bạn sẽ viết gì?"
                </p>
                <p style="font-size: 1.6rem; color: rgba(255,255,255,0.7); margin-top: 3rem; font-style: italic;">
                    (Deepfake, Thất nghiệp, Đạo đức, Bản quyền, Hacker, Mất kiểm soát...)
                </p>
            </div>

        </div>

    </div>

    <!-- Navigation -->
    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.location.href = 'Content04_3.html';
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.location.href = '../Content05/Content05_1.html';
            }
        });
    </script>
</body>
</html>
