<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 20</title>
    <link rel="stylesheet" href="../../style.css">
    <script src="../../assets/sidebar.js" defer></script>
</head>
<body style="background: url('../../BackgroundPNG/Slide3.png') center/cover no-repeat;">
    <div class="slide-container" style="background: transparent; justify-content: flex-start; padding: 3vh 8%;">
        
        <!-- Main Title -->
        <h1 class="title-huge" style="font-size: 5rem; text-align: center; margin-bottom: 2vh; letter-spacing: 15px; opacity: 0.9;">
            Q&A
        </h1>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 60px; width: 100%; flex: 1; padding-bottom: 5vh;">
            
            <!-- Left: Human/Primary -->
            <div style="display: flex; flex-direction: column; align-items: center;">
                <img src="../../assets/human_brain.png" alt="Human Brain" style="width: 220px; height: 220px; object-fit: cover; border-radius: 20px; margin-bottom: -40px; z-index: 2; filter: drop-shadow(0 0 20px rgba(0, 255, 100, 0.4));">
                <div class="qa-card" style="flex: 1; width: 100%; border-color: rgba(0, 255, 100, 0.3); box-shadow: 0 0 40px rgba(0, 255, 100, 0.1); display: flex; flex-direction: column; justify-content: center;">
                    <h3 style="color: #fff; font-size: 2rem; font-weight: 900; margin-bottom: 2rem; font-family: 'Montserrat'; text-transform: uppercase; letter-spacing: 2px;">
                        Mâu thuẫn<br>chủ yếu
                    </h3>
                    <p style="font-size: 1.2rem; line-height: 1.6; opacity: 0.9; color: #fff;">
                        Là yếu tố luôn nổi lên hàng đầu ở mỗi giai đoạn phát triển, có tác dụng quy định và chi phối các yếu tố khác trong cùng giai đoạn đó.
                    </p>
                </div>
            </div>

            <!-- Right: AI/Secondary -->
            <div style="display: flex; flex-direction: column; align-items: center;">
                <img src="../../assets/ai_head.png" alt="AI Head" style="width: 220px; height: 220px; object-fit: cover; border-radius: 20px; margin-bottom: -40px; z-index: 2; filter: drop-shadow(0 0 20px rgba(0, 172, 193, 0.4));">
                <div class="qa-card" style="flex: 1; width: 100%; display: flex; flex-direction: column; justify-content: center;">
                    <h3 style="color: #fff; font-size: 2rem; font-weight: 900; margin-bottom: 2rem; font-family: 'Montserrat'; text-transform: uppercase; letter-spacing: 2px;">
                        Mâu thuẫn<br>thứ yếu
                    </h3>
                    <p style="font-size: 1.2rem; line-height: 1.6; opacity: 0.9; color: #fff;">
                        Là yếu tố không đóng vai trò quyết định trong sự vận động, phát triển của sự vật, hiện tượng.
                    </p>
                </div>
            </div>

        </div>

    </div>

    <!-- Navigation -->
    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.location.href = 'Content04_0.html';
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.location.href = 'Content04_2.html';
            }
        });
    </script>
</body>
</html>
