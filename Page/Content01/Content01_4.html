<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 5</title>
    <link rel="stylesheet" href="../../style.css?v=2">
    <script src="../../assets/sidebar.js" defer></script>
</head>
<body style="background: url('../../BackgroundPNG/slide3.png') center/cover no-repeat;">
    <div class="slide-container" style="background: transparent; justify-content: center; align-items: center; padding: 0;">
        <img src="../../BackgroundPNG/content1_4.PNG" style="width: 85%; height: auto; border-radius: 15px; box-shadow: 0 0 40px rgba(58, 134, 255, 0.3);">
    </div>

    <script>
        // Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.location.href = 'Content01_3.html';
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.location.href = 'Content01_5.html';
            }
        });
    </script>
</body>
