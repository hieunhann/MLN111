<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 26</title>
    <link rel="stylesheet" href="../../style.css">
    <script src="../../assets/sidebar.js" defer></script>
</head>
<body style="background: url('../../BackgroundPNG/Slide3.png') center/cover no-repeat;">
    <div class="slide-container" style="background: transparent; justify-content: center; align-items: center; text-align: center;">
        
        <!-- Large Glowing Thank You Text -->
        <div style="position: relative; padding: 4rem;">
            <!-- Outer Glows -->
            <div style="position: absolute; inset: 0; background: radial-gradient(circle, rgba(0, 172, 193, 0.2) 0%, transparent 70%); filter: blur(40px); z-index: 1;"></div>
            
            <h1 class="title-huge" style="font-size: 8rem; margin: 0; position: relative; z-index: 2; letter-spacing: 20px; text-shadow: 0 0 30px rgba(0, 172, 193, 0.8), 0 0 60px rgba(0, 172, 193, 0.4);">
                CẢM ƠN
            </h1>
            
            <p style="font-size: 2rem; color: #fff; margin-top: 2rem; opacity: 0.8; font-family: 'Montserrat'; letter-spacing: 5px; position: relative; z-index: 2;">
                THẦY VÀ CÁC BẠN ĐÃ CHÚ Ý LẮNG NGHE
            </p>

            <div style="margin-top: 5vh; display: flex; justify-content: center; gap: 40px; position: relative; z-index: 2;">
                <div style="width: 100px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-blue));"></div>
                <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue);"></div>
                <div style="width: 100px; height: 1px; background: linear-gradient(90deg, var(--accent-blue), transparent);"></div>
            </div>
        </div>

    </div>

    <!-- Navigation -->
    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.location.href = '../Content05/Content05_2.html';
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                // Back to start?
                window.location.href = '../Slide0.html';
            }
        });
    </script>
</body>
</html>
