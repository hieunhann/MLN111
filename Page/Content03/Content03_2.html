<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 8</title>
    <link rel="stylesheet" href="../../style.css?v=2">
    <script src="../../assets/sidebar.js" defer></script>
    <style>
        .diagram-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            margin-top: 10vh;
        }

        .node-letter {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 15rem;
            color: #ffffff;
            line-height: 1;
            position: relative;
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }

        .node-letter.purple {
            color: #7175b2;
            text-shadow: 0 0 50px rgba(113, 117, 178, 0.3);
        }

        .node-letter.animate {
            opacity: 1;
            transform: scale(1);
        }

        .arrow-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateX(-40px);
            transition: all 0.7s ease-out;
        }

        .arrow-box.animate {
            opacity: 1;
            transform: translateX(0);
        }

        .arrow-img {
            width: 130px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.2));
        }

        .arrow-label {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 15px;
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body style="background: url('../../BackgroundPNG/Slide2.PNG') center/cover no-repeat;">
    <div class="slide-container" style="background: transparent;">
        
        <!-- Header -->
        <h1 class="title-huge" style="font-size: 4rem; text-align: center; width: 100%; margin-bottom: 2vh; letter-spacing: 2px;">
            Phủ định Của Phủ định
        </h1>

        <!-- Diagram -->
        <div class="diagram-container">
            <!-- Node A -->
            <div class="node-letter" id="node-a">A</div>

            <!-- Arrow 1 -->
            <div class="arrow-box" id="arrow-1">
                <span class="arrow-label">Phủ Định</span>
                <img src="../../BackgroundPNG/green_arrow.png" class="arrow-img" alt="Negation">
            </div>

            <!-- Node B -->
            <div class="node-letter purple" id="node-b">B</div>

            <!-- Arrow 2 -->
            <div class="arrow-box" id="arrow-2">
                <span class="arrow-label">Phủ Định</span>
                <img src="../../BackgroundPNG/green_arrow.png" class="arrow-img" alt="Negation">
            </div>

            <!-- Node A' -->
            <div class="node-letter" id="node-aprime">A’</div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elements = [
                { id: 'node-a', delay: 400 },
                { id: 'arrow-1', delay: 1000 },
                { id: 'node-b', delay: 1600 },
                { id: 'arrow-2', delay: 2200 },
                { id: 'node-aprime', delay: 2800 }
            ];

            elements.forEach(item => {
                setTimeout(() => {
                    const el = document.getElementById(item.id);
                    if(el) el.classList.add('animate');
                }, item.delay);
            });
        });

        // Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.location.href = 'Content03_1.html';
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.location.href = 'Content03_3.html';
            }
        });
    </script>
</body>
</html>
